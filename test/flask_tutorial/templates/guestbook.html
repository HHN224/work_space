{% extends "base.html" %}

{% block title %}留言板{% endblock %}

{% block content %}
    <h1>📝 留言板</h1>

    <!-- 表单：method="POST" 表示数据会"提交"给服务器 -->
    <form method="POST">
        <p>
            <label>你的名字：</label>
            <input type="text" name="username" placeholder="输入昵称" required>
        </p>
        <p>
            <label>留言内容：</label>
            <br>
            <textarea name="message" rows="3" placeholder="说点什么..." required></textarea>
        </p>
        <p>
            <button type="submit">提交留言</button>
        </p>
    </form>

    <hr>

    <h2>所有留言（共 {{ messages|length }} 条）</h2>

    {% if messages %}
        {% for msg in messages %}
            <div class="msg">
                <strong>{{ msg.username }}</strong>
                <small>说：</small>
                <p>{{ msg.message }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>还没有留言，来第一条吧！</p>
    {% endif %}
{% endblock %}
